name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        working-directory: locomotive-furniture

      - run: npm run lint
        working-directory: locomotive-furniture

      - run: npm run test
        working-directory: locomotive-furniture

      - run: npm run build
        working-directory: locomotive-furniture
